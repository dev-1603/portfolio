name: Build and Deploy to dev-1603.github.io

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ./build.db
      GITHUB_PAGES: true
      EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Clean
        run: |
          rm -rf node_modules
          rm -rf .svelte-kit
          rm -rf build

      - name: Install dependencies
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install
          fi

      - name: Build
        run: pnpm run build

      - name: Fix SPA refresh (404 → fallback)
        run: cp build/200.html build/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: dev-1603/dev-1603.github.io
          publish_branch: main
          publish_dir: ./build
          force_orphan: true
          commit_message: "Deploy from portfolio-website - ${{ github.sha }}"
